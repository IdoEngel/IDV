name: Build and Test Compiler

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t idv-compiler .

    - name: Run Build inside Container
      run: |
        docker run --rm idv-compiler /bin/bash -c "
          mkdir -p build && 
          cmake -B build -S . && 
          cmake --build build
        "

    - name: Run Unit Tests
      run: |
        docker run --rm idv-compiler /bin/bash -c "mkdir -p build && cd build && cmake .."
      continue-on-error: true
  test:
    runs-on: ubuntu-latest

    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t idv-compiler .

    - name: Run Unit Tests inside Container
      run: |
        docker run --rm idv-compiler /bin/bash -c "
          mkdir -p build && 
          cmake -B build -S . && 
          cmake --build build && 
          cd build && 
          ctest --output-on-failure
        "
    
  
