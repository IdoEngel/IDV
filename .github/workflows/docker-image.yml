name: Build and Test Compiler

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t idv-compiler .

    - name: Run Build inside Container
      run: |
        docker run --rm idv-compiler /bin/bash -c "
          mkdir -p build && 
          cmake -B build -S . && 
          cmake --build build
        "

    - name: Run Unit Tests
      run: |
        docker run --rm idv-compiler /bin/bash -c "cd build && ctest"
      continue-on-error: true
